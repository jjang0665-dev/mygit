<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사기 수법 자동 시연 — 대전경찰청</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#b2c7da;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}
        
        /* 헤더 */
        header{background:#3a3a3c;color:#fff;padding:15px;display:flex;align-items:center;gap:12px;z-index:10}
        .profile-img{width:40px;height:40px;background:#ddd;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:20px}
        .info h1{font-size:15px;font-weight:bold}
        .info p{font-size:11px;color:#aaa}

        /* 채팅 영역 */
        #chat-area{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px}
        .msg{display:flex;flex-direction:column;max-width:80%;gap:4px;opacity:0;transform:translateY(10px);transition:all 0.4s ease}
        .msg.show{opacity:1;transform:translateY(0)}
        .msg.recv{align-self:flex-start}
        .msg.sent{align-self:flex-end;align-items:flex-end}
        
        .bubble{padding:10px 14px;border-radius:15px;font-size:14px;line-height:1.5;position:relative}
        .recv .bubble{background:#fff;color:#000;border-top-left-radius:2px}
        .sent .bubble{background:#fee500;color:#000;border-top-right-radius:2px}

        /* 하단 안내 */
        #status-bar{background:rgba(0,0,0,0.6);color:#fff;padding:12px;text-align:center;font-size:13px;font-weight:bold}
        
        /* 오버레이 */
        #overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
        .analysis{background:#fff;padding:25px;border-radius:20px;width:100%;max-width:320px}
        .point{color:#dc2626;font-weight:bold;margin:15px 0;display:block}
        .btn-restart{background:#000;color:#fff;border:none;padding:12px 25px;border-radius:10px;margin-top:15px;cursor:pointer}
    </style>
</head>
<body>

<header>
    <div class="profile-img">🍽</div>
    <div class="info">
        <h1>식당 예약 사기 시연 (김준호)</h1>
        <p>실제 범행 대화를 자동으로 재생 중입니다</p>
    </div>
</header>

<div id="chat-area"></div>

<div id="status-bar">사기 수법 분석 중...</div>

<div id="overlay">
    <div class="analysis">
        <h2 style="font-size:18px">🔍 범죄 수법 분석 완료</h2>
        <span class="point">"대리구매 및 선입금 요구"</span>
        <p style="font-size:13px;line-height:1.6;color:#555">
            예약자를 사칭해 신뢰를 쌓은 뒤, 급한 사정을 핑계로 외부 업체(공모자)에 돈을 보내게 하는 수법입니다.<br><br>
            <b>[경찰 지침]</b> 어떤 경우에도 모르는 번호로 온 금전 요구에 응하지 마세요.
        </p>
        <button class="btn-restart" onclick="location.reload()">다시 보기</button>
    </div>
</div>

<script>
    // 자동 재생 대화 데이터
    const script = [
        { type: 'recv', text: "안녕하세요 사장님, 어제 저녁에 8명 회식 예약했던 김준호입니다." },
        { type: 'sent', text: "네, 김준호 사장님. 확인했습니다." },
        { type: 'recv', text: "다름이 아니라 제가 주류업체에 양주 2병을 주문했는데, 거기가 현금만 고집해서요." },
        { type: 'recv', text: "제가 지금 운전 중이라 뱅킹이 안 되는데, 사장님이 90만원만 먼저 보내주시면 안 될까요?" },
        { type: 'sent', text: "현금이요? 그건 좀 곤란한데요..." },
        { type: 'recv', text: "아이고 사장님, 제가 이따 가서 식대랑 합쳐서 카드 결제 해드릴게요. 8명 단체 회식인데 이 술이 꼭 필요해서 그래요." },
        { type: 'sent', text: "알겠습니다. 계좌번호 주세요." },
        { type: 'recv', text: "감사합니다! [중화주류 010-0000-1234] 여기로 입금하시고 확인 부탁드려요." },
        { type: 'sent', text: "네, 입금했습니다." },
        { type: 'recv', text: "확인했습니다. 이따 뵙죠. (이후 잠적)" }
    ];

    const chatArea = document.getElementById('chat-area');
    const statusBar = document.getElementById('status-bar');
    const overlay = document.getElementById('overlay');

    async function playScript() {
        for (let i = 0; i < script.length; i++) {
            const item = script[i];
            
            // 타이핑 중 상태 표시
            statusBar.innerText = item.type === 'recv' ? "상대방이 입력 중..." : "내가 입력 중...";
            
            // 실제 대화 속도와 비슷하게 지연
            await new Promise(res => setTimeout(res, 1500));
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${item.type}`;
            msgDiv.innerHTML = `<div class="bubble">${item.text}</div>`;
            chatArea.appendChild(msgDiv);
            
            // 애니메이션 적용
            setTimeout(() => msgDiv.classList.add('show'), 10);
            
            chatArea.scrollTop = chatArea.scrollHeight;

            // 특정 시점 강조
            if (item.text.includes("입금해 주시면")) {
                statusBar.style.color = "#ff4b4b";
                statusBar.innerText = "⚠️ 경고: 선입금 요구 수법 등장";
                await new Promise(res => setTimeout(res, 1000));
            }
        }

        // 시연 종료 후 분석 결과 표시
        await new Promise(res => setTimeout(res, 2000));
        overlay.style.display = 'flex';
    }

    window.onload = playScript;
</script>

</body>
</html>
