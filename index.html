<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기관사칭 사기 체험관 — 대전경찰청</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column}
        
        /* 헤더 디자인 (카카오톡 느낌) */
        header{background:#3a3a3c;color:#fff;padding:15px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
        .back-btn{font-size:20px;cursor:pointer}
        .profile-img{width:40px;height:40px;background:#ddd;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:20px}
        .info{flex:1}
        .info h1{font-size:16px;font-weight:bold}
        .info p{font-size:11px;color:rgba(255,255,255,0.6)}

        /* 채팅 영역 */
        #chat-area{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;background:#b2c7da}
        .msg{display:flex;flex-direction:column;max-width:80%;gap:4px}
        .msg.recv{align-items:flex-start;align-self:flex-start}
        .msg.sent{align-items:flex-end;align-self:flex-end}
        
        .bubble{padding:10px 14px;border-radius:15px;font-size:14px;line-height:1.5;position:relative;word-break:keep-all}
        .recv .bubble{background:#fff;color:#000;border-top-left-radius:2px}
        .sent .bubble{background:#fee500;color:#000;border-top-right-radius:2px}
        
        .time{font-size:10px;color:rgba(0,0,0,0.4);margin:0 4px}

        /* 하단 선택지 (자동 답변 버튼) */
        #action-area{background:#fff;padding:15px;border-top:1px solid #ddd;display:none;flex-direction:column;gap:10px}
        .action-label{font-size:12px;color:#888;text-align:center;margin-bottom:5px}
        .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .chip{background:#f0f0f0;border:1px solid #ddd;padding:10px 16px;border-radius:20px;font-size:14px;cursor:pointer;transition:background 0.2s}
        .chip:active{background:#ddd}

        /* 결과 화면 오버레이 */
        #overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
        .result-card{background:#fff;color:#000;padding:25px;border-radius:20px;width:100%;max-width:320px}
        .result-card h2{color:#dc2626;margin-bottom:15px}
        .result-card p{font-size:14px;line-height:1.6;margin-bottom:20px}
        .btn-retry{background:#000;color:#fff;border:none;padding:12px 25px;border-radius:10px;font-weight:bold;cursor:pointer}

        /* 타이핑 애니메이션 */
        .typing{font-size:12px;color:#555;margin-left:5px;display:none}
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="location.reload()">❮</div>
    <div class="profile-img">🍽</div>
    <div class="info">
        <h1>어제 예약하신 분 (김준호)</h1>
        <p>상대방이 대화를 기다리고 있습니다</p>
    </div>
</header>

<div id="chat-area">
    </div>

<div id="action-area">
    <div class="action-label">원하시는 답변을 선택하세요</div>
    <div class="chips" id="chip-container"></div>
</div>

<div id="overlay">
    <div class="result-card">
        <h2>⚠️ 사기 확인</h2>
        <p id="result-text"></p>
        <button class="btn-retry" onclick="location.reload()">처음으로 돌아가기</button>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chat-area');
    const chipContainer = document.getElementById('chip-container');
    const actionArea = document.getElementById('action-area');
    const overlay = document.getElementById('overlay');
    const resultText = document.getElementById('result-text');

    // 시나리오 데이터
    const scenario = {
        start: {
            msg: "안녕하세요 사장님, 어제 저녁에 8명 회식 예약했던 김준호입니다. 다름이 아니라 부탁 하나만 드려도 될까 해서요.",
            options: [
                { text: "네, 어떤 부탁이신가요?", next: "request" },
                { text: "누구신지 기억이 잘 안 나는데요.", next: "identity" }
            ]
        },
        identity: {
            msg: "아이고 사장님~ 서운합니다. 어제 저녁에 전화로 예약했잖아요. 덩치 좀 있고 목소리 큰 사람요! 기억나시죠?",
            options: [
                { text: "아 네, 기억납니다. 무슨 일이세요?", next: "request" }
            ]
        },
        request: {
            msg: "제가 단골 주류업체에 '궈자오' 2병을 주문했는데, 거기가 현금만 받는다고 하네요. 제가 지금 운전 중이라... 사장님이 90만원만 먼저 입금해 주시면 안 될까요? 제가 도착하자마자 식대랑 합쳐서 결제할게요.",
            options: [
                { text: "계좌번호 알려주세요.", next: "scam_hit" },
                { text: "가게에 현금이 없어서 어려울 것 같습니다.", next: "pressure" },
                { text: "사기 아니에요? 경찰에 신고할게요.", next: "report" }
            ]
        },
        pressure: {
            msg: "에이 사장님, 저희 오늘 회식 예산만 150만원 넘게 잡았는데... 이 술 없으면 회식이 안 되거든요. 단골 업체라 믿으셔도 됩니다. 정 안되면 50만원이라도 먼저 안 될까요?",
            options: [
                { text: "알겠습니다. 계좌번호 주세요.", next: "scam_hit" },
                { text: "죄송합니다. 직접 하셔야 할 것 같아요.", next: "fail" }
            ]
        },
        scam_hit: {
            msg: "감사합니다 사장님! 역시 통이 크시네요. [중화주류 010-0000-1234] 이쪽으로 90만원 입금해 주시고 확인 문자 부탁드립니다!",
            options: [
                { text: "입금했습니다. 이따 뵙겠습니다.", next: "end_hit" }
            ]
        },
        report: {
            msg: "(상대방이 채팅방을 나갔습니다.)",
            options: [],
            result: "현명한 대처입니다! 사기범들은 '신고'나 '경찰' 언급 시 즉시 대화를 중단하고 도망갑니다. 기관을 사칭하며 대리 송금을 요구하는 것은 100% 사기입니다."
        },
        fail: {
            msg: "아... 그럼 됐습니다. 예약 취소할게요.",
            options: [],
            result: "잘 거절하셨습니다! 사기범은 본인의 요구가 받아들여지지 않으면 노골적으로 불쾌해하거나 예약을 취소하겠다고 협박하지만, 절대 송금해서는 안 됩니다."
        },
        end_hit: {
            msg: "확인했습니다. 이따 뵙죠. (이후 연락 두절)",
            options: [],
            result: "안타깝지만 사기에 당하셨습니다. 사기범은 입금 확인 직후 잠적합니다. 식당 예약 후 주류나 물품 대금을 대신 결제해달라는 것은 전형적인 사기 수법입니다."
        }
    };

    function addMessage(type, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes()}`;
        
        msgDiv.innerHTML = `
            <div class="bubble">${text}</div>
            <div class="time">${timeStr}</div>
        `;
        
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function progress(stepKey) {
        actionArea.style.display = 'none';
        const step = scenario[stepKey];

        // AI 메시지 전송 (약간의 지연으로 실제 채팅 느낌)
        if (step.msg) {
            await new Promise(res => setTimeout(res, 800));
            addMessage('recv', step.msg);
        }

        // 결과 페이지 체크
        if (step.result) {
            await new Promise(res => setTimeout(res, 1500));
            resultText.innerText = step.result;
            overlay.style.display = 'flex';
            return;
        }

        // 선택지 표시
        if (step.options && step.options.length > 0) {
            await new Promise(res => setTimeout(res, 500));
            chipContainer.innerHTML = '';
            step.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'chip';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    addMessage('sent', opt.text);
                    progress(opt.next);
                };
                chipContainer.appendChild(btn);
            });
            actionArea.style.display = 'flex';
        }
    }

    // 초기 실행
    window.onload = () => {
        progress('start');
    };
</script>

</body>
</html>
