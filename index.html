<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 보이스피싱 체험관 — 대전경찰청</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#000;font-family:-apple-system,sans-serif;color:#fff;overflow:hidden;height:100vh}
        
        /* 통화 수신 화면 */
        #call-screen{display:flex;flex-direction:column;align-items:center;justify-content:space-around;height:100%;background:linear-gradient(to bottom, #1a1a2e, #000)}
        .caller-info{text-align:center;margin-top:60px}
        .caller-name{font-size:32px;font-weight:bold;margin-bottom:10px}
        .caller-label{font-size:16px;color:#4ade80;letter-spacing:2px}
        
        .call-actions{display:flex;gap:60px;margin-bottom:80px}
        .action-btn{width:75px;height:75px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer}
        .accept{background:#4ade80;color:#fff;animation:pulse 1.5s infinite}
        .decline{background:#ff4b4b;color:#fff}
        
        /* 통화 중 화면 */
        #incall-screen{display:none;flex-direction:column;align-items:center;height:100%;padding:40px 20px}
        .status{font-size:18px;color:#aaa;margin-top:20px}
        .timer{font-size:20px;margin-top:10px}
        .wave-container{display:flex;align-items:center;gap:5px;height:50px;margin-top:100px}
        .wave{width:5px;height:20px;background:#4ade80;border-radius:10px;transition:0.2s}
        .active-wave{animation:wave-anim 0.5s infinite alternate}
        
        .subtitles{margin-top:40px;text-align:center;font-size:18px;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;width:90%;min-height:60px}
        .end-call-btn{width:70px;height:70px;background:#ff4b4b;border-radius:50%;border:none;margin-top:auto;margin-bottom:50px;font-size:30px}

        @keyframes pulse {0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)}}
        @keyframes wave-anim {from{height:10;opacity:0.5} to{height:40;opacity:1}}
    </style>
</head>
<body>

<!-- 1. 전화 수신 화면 -->
<div id="call-screen">
    <div class="caller-info">
        <div class="caller-label">보이스피싱 체험용 가상번호</div>
        <div class="caller-name">김준호(예약자)</div>
        <div style="color:#aaa">대전 042-***-****</div>
    </div>
    <div class="call-actions">
        <button class="action-btn decline" onclick="location.reload()">📵</button>
        <button class="action-btn accept" onclick="startInCall()">📞</button>
    </div>
    <div style="font-size:13px;color:#666;padding:20px">통화 버튼을 누르면 AI와 대화가 시작됩니다.</div>
</div>

<!-- 2. 통화 중 화면 -->
<div id="incall-screen">
    <div class="caller-name">김준호(예약자)</div>
    <div class="status" id="call-status">대화 중...</div>
    <div class="timer" id="timer">00:00</div>
    
    <div class="wave-container" id="waves">
        <div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div>
    </div>

    <div class="subtitles" id="subtitles">AI가 말을 걸 때까지 잠시만 기다려주세요.</div>

    <button class="end-call-btn" onclick="location.reload()">📞</button>
</div>

<script>
    let recognition;
    let isSpeaking = false;
    let seconds = 0;

    // 1. 통화 시작
    function startInCall() {
        document.getElementById('call-screen').style.display = 'none';
        document.getElementById('incall-screen').style.display = 'flex';
        
        // 타이머 시작
        setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);

        // 첫 인사 시작
        setTimeout(() => {
            aiSpeak("사장님 안녕하세요, 어제 저녁에 8명 회식 예약한 김준호라고 하는데요. 다름이 아니라 부탁 하나만 드려도 될까 해서요.");
        }, 1000);
    }

    // 2. AI가 말하기 (TTS)
    function aiSpeak(text) {
        isSpeaking = true;
        setWaves(true);
        document.getElementById('subtitles').innerText = text;
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.0;
        
        utterance.onend = () => {
            isSpeaking = false;
            setWaves(false);
            startListening(); // 대답이 끝나면 듣기 시작
        };
        
        window.speechSynthesis.speak(utterance);
    }

    // 3. 사용자 말 듣기 (STT)
    function startListening() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("이 브라우저는 음성 인식을 지원하지 않습니다. 크롬이나 사파리를 이용해주세요.");
            return;
        }

        document.getElementById('call-status').innerText = "내 목소리 듣는 중...";
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const userText = event.results[0][0].transcript;
            document.getElementById('subtitles').innerText = "나: " + userText;
            processResponse(userText);
        };

        recognition.onerror = () => {
            if(!isSpeaking) aiSpeak("잘 안 들리는데 다시 말씀해 주시겠어요?");
        };

        recognition.start();
    }

    // 4. 대화 로직 (시나리오)
    function processResponse(text) {
        document.getElementById('call-status').innerText = "AI 생각 중...";
        let reply = "";

        if (text.includes("부탁") || text.includes("말해") || text.includes("뭔데")) {
            reply = "아 별건 아니고요, 제가 주류 업체에 술을 좀 시켰는데 거기서 현금만 받는대서요. 사장님이 90만원만 먼저 보내주시면 안 될까요? 제가 가서 바로 드릴게요.";
        } else if (text.includes("돈") || text.includes("입금") || text.includes("계좌")) {
            reply = "네, 중화주류 010-0000-1234 여기로 지금 바로 보내주시면 됩니다. 사장님만 믿을게요.";
        } else if (text.includes("경찰") || text.includes("신고") || text.includes("사기")) {
            reply = "아... 뭐라는 거야... 바빠 죽겠는데 진짜!";
            setTimeout(() => { location.reload(); }, 2000); // 사기 들키면 종료
        } else {
            reply = "사장님? 제 말 듣고 계시죠? 90만원만 주류 업체에 입금해 주시면 됩니다. 지금 가능하시죠?";
        }

        setTimeout(() => aiSpeak(reply), 1000);
    }

    function setWaves(active) {
        const waves = document.querySelectorAll('.wave');
        waves.forEach(w => active ? w.classList.add('active-wave') : w.classList.remove('active-wave'));
    }
</script>
</body>
</html>
