<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기관사칭 사기 자동 시연관 — 대전경찰청</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:#b2c7da;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        /* 헤더 */
        header{background:#3a3a3c;color:#fff;padding:12px 15px;display:flex;align-items:center;gap:12px;z-index:10;box-shadow:0 2px 5px rgba(0,0,0,0.2)}
        .profile-img{width:40px;height:40px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid #ddd}
        .info h1{font-size:15px;font-weight:bold}
        .info p{font-size:11px;color:#aaa}

        /* 메인 화면 (수법 선택) */
        #menu-screen{flex:1;padding:20px;display:flex;flex-direction:column;gap:15px;overflow-y:auto;background:#f0f0f0}
        .menu-title{font-size:18px;font-weight:bold;margin-bottom:5px;color:#222}
        .menu-card{background:#fff;padding:18px;border-radius:15px;border:1px solid #ddd;cursor:pointer;display:flex;align-items:center;gap:15px;transition:0.2s}
        .menu-card:active{transform:scale(0.98);background:#f9f9f9}
        .menu-icon{font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border-radius:12px}
        .menu-text h2{font-size:15px;color:#333}
        .menu-text p{font-size:12px;color:#777;margin-top:3px}

        /* 채팅 영역 */
        #chat-screen{flex:1;display:none;flex-direction:column;position:relative}
        #chat-area{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px}
        .msg{display:flex;flex-direction:column;max-width:85%;gap:4px;opacity:0;transform:translateY(10px);transition:all 0.4s ease}
        .msg.show{opacity:1;transform:translateY(0)}
        .msg.recv{align-self:flex-start}
        .msg.sent{align-self:flex-end;align-items:flex-end}
        .bubble{padding:10px 14px;border-radius:15px;font-size:14px;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
        .recv .bubble{background:#fff;color:#000;border-top-left-radius:2px}
        .sent .bubble{background:#fee500;color:#000;border-top-right-radius:2px}

        /* 하단 바 */
        #status-bar{background:#3a3a3c;color:#fff;padding:10px;text-align:center;font-size:12px;font-weight:bold}

        /* 분석 오버레이 */
        #overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:30px}
        .analysis-card{background:#fff;padding:25px;border-radius:20px;text-align:center;max-width:340px}
        .danger-tag{background:#dc2626;color:#fff;padding:4px 10px;border-radius:5px;font-size:12px;font-weight:bold;margin-bottom:10px;display:inline-block}
        .btn-home{background:#000;color:#fff;border:none;padding:12px 25px;border-radius:10px;margin-top:20px;cursor:pointer;width:100%}
    </style>
</head>
<body>

<header>
    <div id="header-icon" class="profile-img">🏠</div>
    <div class="info">
        <h1 id="header-title">범죄예방 자동 시연 시스템</h1>
        <p id="header-sub">대전경찰청 공식 홍보 페이지</p>
    </div>
</header>

<!-- 수법 선택 메뉴 -->
<div id="menu-screen">
    <p class="menu-title">체험할 수법을 선택하세요</p>
    
    <div class="menu-card" onclick="startSim(0)">
        <div class="menu-icon">🍽</div>
        <div class="menu-text">
            <h2>1-① 식당 예약형</h2>
            <p>고급 주류(궈자오) 대리구매 및 송금 유도</p>
        </div>
    </div>

    <div class="menu-card" onclick="startSim(1)">
        <div class="menu-icon">🪖</div>
        <div class="menu-text">
            <h2>1-② 재화·용역 계약형</h2>
            <p>군부대 사칭, '마노 미터기' 선구매 요구</p>
        </div>
    </div>

    <div class="menu-card" onclick="startSim(2)">
        <div class="menu-icon">🔬</div>
        <div class="menu-text">
            <h2>1-④ 단가 상승·우회 구매형</h2>
            <p>연구원 사칭, 기존 업체 단가 상승 핑계로 결제 유도</p>
        </div>
    </div>

    <div class="menu-card" onclick="startSim(3)">
        <div class="menu-icon">🔥</div>
        <div class="menu-text">
            <h2>2. 안전 점검형 (소방·지자체)</h2>
            <p>점검 전 '질식소화포' 비치 요구 및 대금 편취</p>
        </div>
    </div>
</div>

<!-- 채팅 화면 -->
<div id="chat-screen">
    <div id="chat-area"></div>
    <div id="status-bar">자동 시연 대기 중...</div>
</div>

<!-- 분석 결과 오버레이 -->
<div id="overlay">
    <div class="analysis-card">
        <div class="danger-tag">경찰 분석 결과</div>
        <h3 id="result-title" style="margin-bottom:10px"></h3>
        <p id="result-desc" style="font-size:13px; color:#555; line-height:1.6"></p>
        <button class="btn-home" onclick="location.reload()">다른 수법 보기</button>
    </div>
</div>

<script>
    const scripts = [
        {
            title: "식당 예약형 (김준호)",
            icon: "🍽",
            dialogs: [
                { type: 'recv', text: "안녕하세요 사장님, 어제 저녁에 8명 회식 예약했던 김준호입니다." },
                { type: 'sent', text: "네, 사장님. 확인했습니다. 무슨 일이신가요?" },
                { type: 'recv', text: "저희가 마실 술 '궈자오 30년산'을 업체에 주문했는데 거기가 현금만 받아서요." },
                { type: 'recv', text: "지금 운전 중이라 뱅킹이 안 되는데 90만원만 먼저 입금해 주시면 가서 합쳐서 긁을게요." },
                { type: 'sent', text: "알겠습니다. 계좌번호 보내주세요." },
                { type: 'recv', text: "[중화주류] 여기로 입금하시고 확인 부탁드려요. (입금 후 잠적)" }
            ],
            result: "대리구매 사기",
            desc: "식당 업주에게 큰 예약을 빌미로 신뢰를 얻은 뒤, 주류 대금을 가짜 업체에 입금하게 만드는 수법입니다."
        },
        {
            title: "육군 32사단 박대위",
            icon: "🪖",
            dialogs: [
                { type: 'recv', text: "안녕하십니까 사장님, 육군 32사단 박대위입니다. 이번 별관 신축 공사 건으로 연락드렸습니다." },
                { type: 'sent', text: "아 네, 대위님. 말씀하세요." },
                { type: 'recv', text: "입찰을 위해서는 부대 내에 '마노 미터기'가 5개 구비되어야 합니다." },
                { type: 'recv', text: "지정 업체(010-XXXX)에 연락해서 사단 공사 건이라고 하시고 150만원 선결제 부탁드립니다." },
                { type: 'sent', text: "공식 절차 맞나요? 바로 입금하겠습니다." },
                { type: 'recv', text: "확인되면 부대 방문 일정 잡겠습니다. (입금 후 연락 두절)" }
            ],
            result: "공공기관 사칭 사기",
            desc: "군부대나 관공서의 큰 공사 계약을 미끼로, 듣도 보도 못한 물품(마노 미터기 등)의 선구매를 요구합니다."
        },
        {
            title: "나노기술원 팀장",
            icon: "🔬",
            dialogs: [
                { type: 'recv', text: "한국나노기술원 팀장입니다. 질식소화포를 구입해야 하는데 기존 업체가 단가를 너무 올렸네요." },
                { type: 'sent', text: "그렇군요. 저희가 도와드릴 일이 있을까요?" },
                { type: 'recv', text: "저렴한 소매업체를 알려드릴 테니 대신 구매해 주시면 3일 내 대금 승인받아 지급하겠습니다." },
                { type: 'recv', text: "저희가 예산 한도 초과라 우회 구매가 필요한 상황입니다. 협조 부탁드려요." },
                { type: 'sent', text: "네, 공기관 일이니 도와드려야죠. 입금하겠습니다." },
                { type: 'recv', text: "결제 완료 후 영수증 보내주세요. (입금 후 실종)" }
            ],
            result: "우회 구매대행 사기",
            desc: "단가 상승이나 수의계약 한도 초과 등의 그럴듯한 핑계를 대며 제3의 업체를 통해 대신 물건을 사달라고 유도합니다."
        },
        {
            title: "소방본부 팀장",
            icon: "🔥",
            dialogs: [
                { type: 'recv', text: "소방본부 팀장입니다. 내일 귀하의 사업장(캠핑장) 소방 점검 예정입니다." },
                { type: 'sent', text: "점검요? 오늘 처음 듣는 소리인데요." },
                { type: 'recv', text: "확인하니 질식소화포가 비치 안 되어 있네요. 이거 없으면 점검 통과 안 됩니다." },
                { type: 'recv', text: "지정 업체에서 구입 후 '혁신제품지정인증서' 받아두면 나중에 구매 대금 전액 환급해 줍니다." },
                { type: 'sent', text: "환급해 준다니 다행이네요. 바로 구매하겠습니다." },
                { type: 'recv', text: "지금 바로 송금하시고 인증서 챙기세요. (송금 후 잠적)" }
            ],
            result: "안전 점검 빙자 사기",
            desc: "점검 불이익을 언급하며 겁을 주고, 나중에 환급해 준다는 거짓말로 특정 물품의 구매를 강요합니다."
        }
    ];

    function startSim(index) {
        const sc = scripts[index];
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('header-title').innerText = sc.title;
        document.getElementById('header-icon').innerText = sc.icon;
        
        play(sc);
    }

    async function play(sc) {
        const area = document.getElementById('chat-area');
        const status = document.getElementById('status-bar');

        for (let d of sc.dialogs) {
            status.innerText = d.type === 'recv' ? "상대방이 입력 중..." : "내가 입력 중...";
            await new Promise(r => setTimeout(r, 1500));
            
            const m = document.createElement('div');
            m.className = `msg ${d.type}`;
            m.innerHTML = `<div class="bubble">${d.text}</div>`;
            area.appendChild(m);
            setTimeout(() => m.classList.add('show'), 10);
            area.scrollTop = area.scrollHeight;

            if(d.text.includes("입금") || d.text.includes("송금") || d.text.includes("결제")) {
                status.style.color = "#ff4b4b";
                status.innerText = "⚠️ 경고: 선입금 요구 수법 포착";
                await new Promise(r => setTimeout(r, 800));
            }
        }

        await new Promise(r => setTimeout(r, 2000));
        document.getElementById('result-title').innerText = sc.result;
        document.getElementById('result-desc').innerText = sc.desc;
        document.getElementById('overlay').style.display = 'flex';
    }
</script>

</body>
</html>
