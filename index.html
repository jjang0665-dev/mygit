<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기관사칭 사기 체험 시뮬레이터 — 대전경찰청</title>
    <style>
        /* 기존 스타일 유지 및 가독성 보완 */
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;color:#fff;overflow:hidden}
        #intro, #chat-screen, #result-screen { position: absolute; top:0; left:0; width:100%; height:100%; overflow-y:auto; display:none; flex-direction:column; }
        
        /* 인트로 디자인 */
        #intro{display:flex; background:#0a0a14; align-items:center; justify-content:center; padding:32px 24px; gap:20px; text-align:center}
        .badge{background:#dc2626; color:#fff; font-size:11px; font-weight:700; padding:4px 14px; border-radius:20px}
        .intro-title{font-size:26px; font-weight:800; line-height:1.3}
        .method-grid{display:grid; grid-template-columns:1fr; gap:12px; width:100%; max-width:340px}
        .method-btn{border:none; border-radius:14px; padding:18px 20px; text-align:left; cursor:pointer; display:flex; align-items:center; gap:14px; background:#1a1a1e; color:#fff}
        
        /* 채팅 UI */
        #chat-screen{background:#1c1c1e}
        .chat-header{background:#111; padding:15px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #333}
        .header-icon{width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px}
        .messages{flex:1; padding:20px 15px; display:flex; flex-direction:column; gap:15px}
        .mw{display:flex; flex-direction:column; gap:5px}
        .mw.recv{align-items:flex-start}
        .mw.sent{align-items:flex-end}
        .bubble{max-width:85%; padding:12px 16px; border-radius:18px; font-size:15px; line-height:1.5; position:relative}
        .bubble.recv{background:rgba(255,255,255,0.1); border-bottom-left-radius:4px}
        .bubble.sent{background:#007aff; border-bottom-right-radius:4px}
        
        /* 경고 바 */
        .warn-bar{background:rgba(255,152,0,0.15); border-left:4px solid #ff9800; padding:10px 15px; margin:5px 10px; border-radius:4px; color:#ffb74d; font-size:13px; font-weight:600; animation: shake 0.5s}
        @keyframes shake { 0%, 100% {transform:translateX(0)} 25% {transform:translateX(-5px)} 75% {transform:translateX(5px)} }

        /* 입력창 */
        .input-row{background:#2c2c2e; padding:15px; display:flex; gap:10px; align-items:center}
        #inp{flex:1; background:rgba(255,255,255,0.05); border:none; border-radius:20px; padding:10px 15px; color:#fff; font-size:15px; outline:none}
        .send-btn{width:40px; height:40px; border-radius:50%; background:#007aff; border:none; color:#fff; font-weight:bold}
        
        /* 결과 화면 */
        #result-screen{background:#0a0a14; padding:30px 20px; text-align:center}
        .r-item{background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.3); padding:15px; border-radius:12px; margin-bottom:10px; text-align:left}
        .r-cta{background:#dc2626; color:#fff; border:none; padding:18px; border-radius:12px; width:100%; font-size:18px; font-weight:800; margin-top:20px}
    </style>
</head>
<body>

<div id="intro">
    <div class="badge">대전경찰청 예방 시뮬레이터</div>
    <div class="intro-title">기관사칭 사기<br>직접 체험해보세요</div>
    <div class="method-grid">
        <button class="method-btn" onclick="startSim(0)">
            <div style="font-size:30px">🍽</div>
            <div>
                <div style="font-size:12px; color:#aaa">수법 1</div>
                <div style="font-weight:700">식당예약형 (대리구매)</div>
            </div>
        </button>
        <button class="method-btn" onclick="startSim(1)">
            <div style="font-size:30px">🪖</div>
            <div>
                <div style="font-size:12px; color:#aaa">수법 2</div>
                <div style="font-weight:700">군부대 사칭 (납품미끼)</div>
            </div>
        </button>
    </div>
    <p style="font-size:12px; color:#666">※ 본 페이지는 교육 목적으로 제작된 가상 시뮬레이션입니다.</p>
</div>

<div id="chat-screen">
    <div class="chat-header">
        <div class="header-icon" id="h-icon"></div>
        <div>
            <div id="h-name" style="font-weight:700"></div>
            <div style="font-size:11px; color:#888">실시간 대화 중</div>
        </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-row">
        <input type="text" id="inp" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13)send()">
        <button class="send-btn" onclick="send()">전송</button>
    </div>
</div>

<div id="result-screen">
    <h2 style="margin-bottom:20px">⚠️ 사기 위험 분석 결과</h2>
    <div id="result-list"></div>
    <div style="background:#1a3a1a; color:#4ade80; padding:15px; border-radius:12px; font-size:14px; line-height:1.6; margin-top:20px">
        <b>[대전경찰청 예방수칙]</b><br>
        모르는 번호로 온 대리구매/송금 요청은 100% 사기입니다. 반드시 공식 번호로 확인하세요!
    </div>
    <button class="r-cta" onclick="window.location.href='tel:112'">긴급신고 112</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:20px">다시 체험하기</button>
</div>

<script>
const METHODS = [
    {
        name: '김준호 (예약자)', icon: '🍽', bg: '#2a1f08',
        opener: '사장님 안녕하세요, 어제 8인 회식 예약한 사람입니다. 다름이 아니라 부탁 하나만 드려도 될까요?',
        rules: [
            { key: ['누구', '어디', '성함'], resp: '어제 저녁에 전화로 예약했잖아요~ 김준호라고 합니다. 기억 안 나세요?' },
            { key: ['부탁', '뭔데', '말씀'], resp: '제가 단골 주류업체에 궈자오 30년산 2병을 주문했는데, 거기서 현금만 받는다고 해서요. 사장님이 먼저 입금해주시면 제가 이따 가서 식대랑 합쳐서 결제해드릴게요.' },
            { key: ['입금', '돈', '계좌'], resp: '중화주류 010-0000-1234 여기로 90만원만 보내주시면 됩니다. 지금 바로 가능하실까요?' },
            { key: ['안돼', '싫어', '직접'], resp: '아유 사장님, 제가 지금 운전 중이라 급해서 그래요. 큰 손님 놓치실 거예요?' }
        ],
        tactics: [
            {id: 't1', label: '대리구매 유도', desc: '외부 업체에 대신 입금해달라는 요구는 전형적인 사기입니다.'},
            {id: 't2', label: '가짜 업체 알선', desc: '사기범과 공모한 가짜 연락처를 알려줍니다.'}
        ]
    },
    {
        name: '박대위 (육군32사단)', icon: '🪖', bg: '#0f1f3a',
        opener: '안녕하십니까 사장님, 육군 32사단 박대위입니다. 이번 부대 공사 건으로 견적 좀 여쭤보려 합니다.',
        rules: [
            { key: ['공사', '견적', '어떤'], resp: '부대 내 시설 보수공사 건인데, 조건이 하나 있습니다. 저희가 지정한 특수 미터기를 미리 구비해두셔야 계약이 가능합니다.' },
            { key: ['미터기', '구매', '어디'], resp: '산업자재유통(010-1234-5678) 여기에 연락해서 사단 공사 건이라고 하면 바로 보내줄 겁니다. 선결제 후 영수증 주세요.' },
            { key: ['돈', '얼마', '입금'], resp: '개당 30만원씩 총 150만원입니다. 부대 예산은 나중에 한꺼번에 정산되니 걱정 마십시오.' }
        ],
        tactics: [
            {id: 't3', label: '기관 사칭', desc: '공공기관이나 군부대를 사칭하여 신뢰를 얻습니다.'},
            {id: 't4', label: '선결제 요구', desc: '계약 조건으로 특정 업체 물품 구매를 강요하는 것은 사기입니다.'}
        ]
    }
];

let currentSim = null;
let detected = new Set();
let isEnded = false;

function startSim(idx) {
    currentSim = METHODS[idx];
    document.getElementById('intro').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    
    const iconEl = document.getElementById('h-icon');
    iconEl.textContent = currentSim.icon;
    iconEl.style.background = currentSim.bg;
    document.getElementById('h-name').textContent = currentSim.name;
    
    setTimeout(() => addBubble('recv', currentSim.opener), 500);
}

function addBubble(type, text) {
    const box = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'mw ' + type;
    wrap.innerHTML = `<div class="bubble ${type}">${text}</div>`;
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
}

function send() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if(!text || isEnded) return;

    addBubble('sent', text);
    inp.value = '';

    // 사기 감지 로직
    if(text.includes("신고") || text.includes("경찰") || text.includes("112")) {
        setTimeout(() => {
            addBubble('recv', '... (상대방이 전화를 끊었습니다)');
            isEnded = true;
            setTimeout(showResult, 1500);
        }, 1000);
        return;
    }

    // 시나리오 답변 검색
    let response = "무슨 말씀이신지 잘 모르겠네요. 일단 제가 말씀드린 것부터 처리해주시면 안 될까요?";
    for(let rule of currentSim.rules) {
        if(rule.key.some(k => text.includes(k))) {
            response = rule.resp;
            if(rule.key.includes('입금')) detected.add(currentSim.tactics[1].id);
            if(rule.key.includes('부탁')) detected.add(currentSim.tactics[0].id);
            break;
        }
    }

    // 경고 알림 표시 (교육용)
    if(response.includes("입금") || response.includes("구매")) {
        showWarn("잠깐! 특정 업체로 송금을 유도하고 있습니다.");
    }

    setTimeout(() => addBubble('recv', response), 1000);
}

function showWarn(msg) {
    const b = document.createElement('div');
    b.className = 'warn-bar';
    b.textContent = '⚠️ ' + msg;
    document.getElementById('messages').appendChild(b);
}

function showResult() {
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    const list = document.getElementById('result-list');
    
    currentSim.tactics.forEach(t => {
        const item = document.createElement('div');
        item.className = 'r-item';
        item.innerHTML = `<b>${t.label}</b><br><small style="color:#aaa">${t.desc}</small>`;
        list.appendChild(item);
    });
}
</script>
</body>
</html>
